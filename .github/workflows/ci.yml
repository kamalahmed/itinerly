name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: itinerly
          POSTGRES_PASSWORD: itinerly
          POSTGRES_DB: itinerly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itinerly -d itinerly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://itinerly:itinerly@localhost:5432/itinerly_test?schema=public
      NEXT_PUBLIC_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm prisma migrate deploy

      - name: Seed the database
        run: pnpm prisma db seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm exec next build
