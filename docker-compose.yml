# Local Postgres for itinerly development. One-line setup:
#
#   docker compose up -d
#
# Then set DATABASE_URL in .env to:
#   postgresql://itinerly:itinerly@localhost:5432/itinerly?schema=public
services:
  postgres:
    image: postgres:16-alpine
    container_name: itinerly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: itinerly
      POSTGRES_PASSWORD: itinerly
      POSTGRES_DB: itinerly
    ports:
      - "5432:5432"
    volumes:
      - itinerly-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itinerly -d itinerly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  itinerly-pg-data:
